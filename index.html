"<!DOCTYPE html>
<!-- SmartFlex 개발DNA 우주 홀로그램 v2.0 - 파일명: index.html -->
<html lang=\"ko\">
<head>
  <meta charset=\"UTF-8\" />
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />
  <title>SmartFlex - 개발DNA 우주 홀로그램</title>

  <!-- D3.js v7 CDN -->
  <script src=\"https://d3js.org/d3.v7.min.js\"></script>

  <!-- 폰트 -->
  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />
  <link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap\" rel=\"stylesheet\" />

  <style>
    /* ========================================
     * 전역 스타일 및 CSS 변수
     * 파일명: index.html (인라인 스타일)
     * ======================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #09090f;
      --bg2:      #0f0f1a;
      --surface:  #1a1a2e;
      --border:   #2a2a45;
      --text:     #e8e8f0;
      --text2:    #9090b0;
      --text3:    #5a5a80;
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --grad:     linear-gradient(135deg, #6c63ff 0%, #a78bfa 50%, #38bdf8 100%);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      overflow: hidden; /* 스크롤 제거 */
      height: 100vh;
    }

    /* ========================================
     * 네비게이션
     * ======================================== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(9,9,15,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      height: 60px;
    }
    
    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .logo:hover {
      transform: scale(1.05);
    }
    
    .nav-links { 
      display: flex; 
      gap: 2.5rem; 
      list-style: none; 
    }
    
    .nav-links a { 
      color: var(--text2); 
      text-decoration: none; 
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
      cursor: pointer;
    }
    
    .nav-links a:hover { 
      color: var(--text); 
    }

    /* ========================================
     * 히어로 섹션 (메인 화면)
     * ======================================== */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: var(--bg);
    }

    /* DNA 우주 배경 */
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* 텍스트 컨텐츠 */
    .hero-content {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
      width: 100%;
      padding-top: 60px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
      background: rgba(26,26,46,0.7);
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      max-width: 700px;
    }

    .gradient-text {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-desc {
      font-size: 1.1rem;
      color: var(--text2);
      max-width: 600px;
      margin-bottom: 3rem;
      line-height: 1.9;
    }

    .hero-cta {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      padding: 0.9rem 2rem;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.3s;
      box-shadow: 0 0 24px rgba(108,99,255,0.4);
      cursor: pointer;
      border: none;
    }
    
    .btn-primary:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 0 40px rgba(108,99,255,0.7); 
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      padding: 0.9rem 2rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--text2);
      font-weight: 500;
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.3s;
      backdrop-filter: blur(6px);
      cursor: pointer;
      background: transparent;
    }
    
    .btn-ghost:hover { 
      border-color: var(--accent); 
      color: var(--text);
      background: rgba(108,99,255,0.1);
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ========================================
     * 년도 표시 (회전하는 큰 텍스트)
     * ======================================== */
    .era-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
      text-align: center;
    }

    .era-year {
      font-size: clamp(8rem, 20vw, 18rem);
      font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.08;
      line-height: 1;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.05em;
    }

    .era-desc {
      font-size: 1.2rem;
      color: var(--text3);
      font-weight: 500;
      margin-top: 1rem;
      opacity: 0.5;
    }

    /* ========================================
     * 슬라이딩 모달 (아래에서 위로)
     * ======================================== */
    .page-modal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100vh;
      z-index: 200;
      background: rgba(9,9,15,0.95);
      backdrop-filter: blur(16px);
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .page-modal.active {
      transform: translateY(0);
    }

    .modal-header {
      position: sticky;
      top: 0;
      background: rgba(9,9,15,0.98);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }

    .modal-close {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1.5rem;
      font-weight: 300;
    }

    .modal-close:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(108,99,255,0.1);
    }

    .modal-content {
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .modal-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }

    /* ========================================
     * 반응형
     * ======================================== */
    @media (max-width: 768px) {
      h1 { font-size: 2.2rem; }
      .hero-desc { font-size: 1rem; }
      .nav-links { gap: 1.5rem; }
      .nav-links a { font-size: 0.85rem; }
      .era-year { font-size: 6rem; }
    }
  </style>
</head>

<body>

  <!-- ========================================
   * 네비게이션
   * ======================================== -->
  <nav class=\"nav\">
    <div class=\"nav-inner\">
      <div class=\"logo\" onclick=\"closeAllModals()\">SmartFlex</div>
      <ul class=\"nav-links\">
        <li><a onclick=\"openPage('about')\">소개</a></li>
        <li><a onclick=\"openPage('tech')\">기술 스택</a></li>
        <li><a onclick=\"openPage('contact')\">연락처</a></li>
      </ul>
    </div>
  </nav>

  <!-- ========================================
   * 히어로 섹션 (메인 화면)
   * ======================================== -->
  <section class=\"hero\">

    <!-- DNA 우주 배경 (SVG가 주입될 컨테이너) -->
    <div class=\"hero-bg\" id=\"dna-universe\"></div>

    <!-- 년도 표시 (회전) -->
    <div class=\"era-display\">
      <div class=\"era-year\" id=\"era-year\">2025</div>
      <div class=\"era-desc\" id=\"era-desc\">AI와 LLM의 폭발적 성장</div>
    </div>

    <!-- 텍스트 컨텐츠 -->
    <div class=\"hero-content\">
      <div class=\"badge\">🧬 DEVELOPMENT DNA · UNIVERSE</div>
      <h1>IT의 모든 기술,<br /><span class=\"gradient-text\">SmartFlex가 구현합니다</span></h1>
      <p class=\"hero-desc\">
        클라우드 네이티브 인프라부터<br />
        LLM 파인튜닝과 RAG 파이프라인까지<br />
        기술 스택을 전문적으로 구축 설계합니다.
      </p>
      <div class=\"hero-cta\">
        <button class=\"btn-primary\" onclick=\"openPage('tech')\">기술 스택 보기</button>
        <button class=\"btn-ghost\" onclick=\"openPage('contact')\">문의하기</button>
      </div>
    </div>

  </section>

  <!-- ========================================
   * 슬라이딩 모달 (페이지 표시)
   * ======================================== -->
  <div class=\"page-modal\" id=\"pageModal\">
    <div class=\"modal-header\">
      <div class=\"modal-title\" id=\"modalTitle\">페이지</div>
      <button class=\"modal-close\" onclick=\"closeAllModals()\">×</button>
    </div>
    <div class=\"modal-content\">
      <iframe class=\"modal-iframe\" id=\"modalIframe\" src=\"\"></iframe>
    </div>
  </div>

  <!-- ========================================
   * 모달 제어 스크립트
   * 파일명: index.html (인라인)
   * ======================================== -->
  <script>
    // 페이지 열기
    function openPage(pageName) {
      const modal = document.getElementById('pageModal');
      const iframe = document.getElementById('modalIframe');
      const title = document.getElementById('modalTitle');
      
      const pageMap = {
        'about': { title: '소개', url: 'pages/about.html' },
        'tech': { title: '기술 스택', url: 'pages/tech.html' },
        'contact': { title: '연락처', url: 'pages/contact.html' }
      };
      
      const page = pageMap[pageName];
      if (page) {
        title.textContent = page.title;
        iframe.src = page.url;
        modal.classList.add('active');
      }
    }

    // 모달 닫기
    function closeAllModals() {
      const modal = document.getElementById('pageModal');
      modal.classList.remove('active');
      setTimeout(() => {
        document.getElementById('modalIframe').src = '';
      }, 500);
    }

    // ESC 키로 닫기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeAllModals();
    });
  </script>

  <!-- DNA 우주 애니메이션 스크립트 -->
  <script src=\"js/dna-animation.js\"></script>

</body>
</html>
"
