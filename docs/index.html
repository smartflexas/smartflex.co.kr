<!DOCTYPE html>
<!-- SmartFlex 개발DNA 우주 홀로그램 v2.0 - 파일명: index.html -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartFlex - 개발DNA 우주 홀로그램</title>

  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" href="/favicon.png">

  <!-- D3.js v7 CDN -->
  <script src="https://d3js.org/d3.v7.min.js" defer></script>

  <!-- 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/index.css" />

</head>

<body>
  <a href="#hero-content" class="skip-nav">본문으로 바로가기</a>

  <!-- ========================================
   * 네비게이션
   * ======================================== -->
  <nav class="nav">
    <div class="nav-inner">
      <div class="logo" data-action="close" role="button" tabindex="0">SmartFlex</div>
      <button class="hamburger" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="navLinks">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="#" data-page="about">소개</a></li>
        <li><a href="#" data-page="tech">기술 스택</a></li>
        <li><a href="#" data-page="contact">연락처</a></li>
      </ul>
    </div>
  </nav>

  <!-- ========================================
   * 히어로 섹션 (메인 화면)
   * ======================================== -->
  <section class="hero">

    <!-- DNA 우주 배경 (SVG가 주입될 컨테이너) -->
    <div class="hero-bg" id="dna-universe"></div>

    <!-- 년도 표시 (회전) -->
    <div class="era-display">
      <div class="era-year" id="era-year">2025</div>
      <div class="era-desc" id="era-desc">AI와 LLM의 폭발적 성장</div>
    </div>

    <!-- 텍스트 컨텐츠 -->
    <div class="hero-content" id="hero-content">
      <div class="badge">🧬 개발 DNA 우주 홀로그램</div>
      <h1>기술의 진화가<br /><span class="gradient-text">DNA 홀로그램으로 펼쳐집니다</span></h1>
      <p class="hero-desc">
        클라우드 네이티브 인프라부터<br />
        LLM 파인튜닝과 RAG 파이프라인까지<br />
        기술 스택을 전문적으로 구축 설계합니다.
      </p>
      <div class="hero-cta">
        <button class="btn-primary" type="button" data-page="tech">기술 스택 보기</button>
        <button class="btn-ghost" type="button" data-page="contact">문의하기</button>
      </div>
    </div>

    <!-- 브랜드 궤도 링 홀로그램 비주얼 -->
    <div class="hero-visual" aria-hidden="true">
      <div class="orbit-ring ring-1"></div>
      <div class="orbit-ring ring-2"></div>
      <div class="orbit-ring ring-3"></div>
      <div class="core-circle">SF</div>
    </div>

    <!-- 시대별 기술 타임라인 수동 선택 버튼 -->
    <div class="era-controls" aria-label="기술 시대 선택">
      <button type="button" data-era-index="0">1990s</button>
      <button type="button" data-era-index="1">2000s</button>
      <button type="button" data-era-index="2">2010s</button>
      <button type="button" data-era-index="3">2020s</button>
    </div>

  </section>

  <!-- ========================================
   * 슬라이딩 모달 (페이지 표시)
   * ======================================== -->
  <div class="page-modal" id="pageModal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">페이지</div>
      <button class="modal-close">×</button>
    </div>
    <div class="modal-content">
      <div class="modal-loader" aria-live="polite">페이지를 불러오는 중...</div>
      <iframe class="modal-iframe" id="modalIframe" src="" title="페이지"></iframe>
    </div>
  </div>

  <!-- ========================================
   * 모달 제어 스크립트
   * 파일명: docs/js/index.js
   * ======================================== -->
  <script src="js/index.js" defer></script>
  <script src="js/dna-animation.js" defer></script>

</body>
</html>
