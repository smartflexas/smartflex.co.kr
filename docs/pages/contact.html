<!DOCTYPE html>
<!-- 파일명: docs/pages/contact.html -->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFlex - 연락처</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090f;
      --surface: #1a1a2e;
      --border: #2a2a45;
      --text: #e8e8f0;
      --text2: #9090b0;
      --accent: #6c63ff;
      --grad: linear-gradient(135deg, #6c63ff 0%, #a78bfa 50%, #38bdf8 100%);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      line-height: 1.6;
      padding: 3rem 2rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { 
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text2);
      font-size: 1.1rem;
      margin-bottom: 3rem;
      line-height: 1.8;
    }

    .contact-grid {
      display: grid;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      transition: all 0.2s;
    }

    .contact-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 12px 32px rgba(108,99,255,0.2);
    }

    .contact-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .contact-label {
      font-size: 0.9rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .contact-value {
      font-size: 1.3rem;
      color: var(--text);
      font-weight: 500;
    }

    .contact-link {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-link:hover {
      color: #a78bfa;
    }

    .social-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
    }

    .social-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 0.2s;
      cursor: pointer;
      text-decoration: none;
    }

    .social-btn:hover {
      border-color: var(--accent);
      background: rgba(108,99,255,0.1);
      transform: translateY(-2px);
    }

    .note {
      background: rgba(108,99,255,0.05);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 3rem;
      text-align: left;
    }

    .note-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }

    .note-text {
      font-size: 0.9rem;
      color: var(--text2);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📧 연락처</h1>
    <p class="subtitle">
      프로젝트 문의, 기술 상담, 협업 제안 등<br>
      언제든지 편하게 연락주세요.
    </p>

    <div class="contact-grid">
      <div class="contact-card">
        <div class="contact-icon">✉️</div>
        <div class="contact-label">Email</div>
        <div class="contact-value">
          <a href="mailto:contact@smartflex.co.kr" class="contact-link">
            contact@smartflex.co.kr
          </a>
        </div>
      </div>

      <div class="contact-card">
        <div class="contact-icon">🌐</div>
        <div class="contact-label">Website</div>
        <div class="contact-value">
          <a href="https://smartflex.co.kr" target="_blank" class="contact-link">
            smartflex.co.kr
          </a>
        </div>
      </div>

      <div class="contact-card">
        <div class="contact-icon">📍</div>
        <div class="contact-label">Location</div>
        <div class="contact-value">
          Seoul, South Korea
        </div>
      </div>
    </div>

    <div class="social-links">
      <a href="#" class="social-btn" title="GitHub">🐙</a>
      <a href="#" class="social-btn" title="LinkedIn">🔗</a>
      <a href="#" class="social-btn" title="Twitter">🐦</a>
    </div>

    <div class="note">
      <div class="note-title">💡 빠른 응답 보장</div>
      <div class="note-text">
        모든 문의는 24시간 이내에 응답드립니다. 긴급한 경우 제목에 [URGENT]를 표기해주세요.<br>
        영업시간: 평일 09:00 - 18:00 (KST)
      </div>
    </div>
  </div>
</body>
</html>
