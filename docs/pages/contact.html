<!DOCTYPE html>
<!-- 파일명: docs/pages/contact.html -->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFlex - 연락처</title>
  <link rel="stylesheet" href="../css/pages.css" />
  <script src="../js/pages.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>📧 연락처</h1>
    <p class="subtitle">
      프로젝트 문의, 기술 상담, 협업 제안 등<br>
      언제든지 편하게 연락주세요.
    </p>

    <div class="contact-grid">
      <div class="contact-card">
        <div class="contact-icon">✉️</div>
        <div class="contact-label">Email</div>
        <div class="contact-value">
          <a href="mailto:contact@smartflex.co.kr" class="contact-link">
            contact@smartflex.co.kr
          </a>
        </div>
      </div>

      <div class="contact-card">
        <div class="contact-icon">🌐</div>
        <div class="contact-label">Website</div>
        <div class="contact-value">
          <a href="https://smartflex.co.kr" target="_blank" class="contact-link">
            smartflex.co.kr
          </a>
        </div>
      </div>

      <div class="contact-card">
        <div class="contact-icon">📍</div>
        <div class="contact-label">Location</div>
        <div class="contact-value">
          Seoul, South Korea
        </div>
      </div>
    </div>

    <form class="contact-form" name="smartflex-contact" method="POST" data-netlify="true">
      <input type="hidden" name="form-name" value="smartflex-contact" />
      <h2>문의 보내기</h2>
      <div class="form-grid">
        <label>이름<input name="name" type="text" required placeholder="홍길동" /></label>
        <label>이메일<input name="email" type="email" required placeholder="name@example.com" /></label>
      </div>
      <label>긴급 여부
        <select name="urgency">
          <option value="normal">일반 문의</option>
          <option value="urgent">긴급 문의</option>
        </select>
      </label>
      <label>문의 내용<textarea name="message" rows="6" required placeholder="프로젝트 요구사항이나 상담 내용을 적어주세요."></textarea></label>
      <button class="form-submit" type="submit">문의 전송</button>
    </form>

    <div class="social-links" hidden aria-hidden="true">
      <a href="#" class="social-btn" title="GitHub">🐙</a>
      <a href="#" class="social-btn" title="LinkedIn">🔗</a>
      <a href="#" class="social-btn" title="Twitter">🐦</a>
    </div>

    <div class="note">
      <div class="note-title">💡 빠른 응답 보장</div>
      <div class="note-text">
        모든 문의는 24시간 이내에 응답드립니다. 긴급한 경우 제목에 [URGENT]를 표기해주세요.<br>
        영업시간: 평일 09:00 - 18:00 (KST)
      </div>
    </div>
  </div>
</body>
</html>
